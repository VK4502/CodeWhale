<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>合成大石头</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; min-height: 100dvh; color: #eee;
    user-select: none; -webkit-user-select: none;
    touch-action: none; overflow: hidden;
  }
  .container {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 420px; padding: 8px;
  }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%; margin-bottom: 6px;
  }
  .title { font-size: 28px; font-weight: 900; color: #ffd700; }
  .scores { display: flex; gap: 6px; }
  .score-box {
    background: #16213e; color: #eee; border-radius: 6px;
    padding: 6px 12px; text-align: center; min-width: 65px;
    border: 1px solid #0f3460; font-size: 12px;
  }
  .score-box .val { font-size: 18px; font-weight: 700; color: #ffd700; }
  .game-wrap {
    position: relative; width: 100%; max-width: 380px;
    background: #16213e; border-radius: 10px; overflow: hidden;
    border: 2px solid #0f3460; aspect-ratio: 3/5;
  }
  canvas { display: block; width: 100%; height: 100%; }
  .overlay {
    position: absolute; inset: 0; background: rgba(22,33,62,0.85);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; z-index: 10; gap: 10px;
  }
  .overlay .msg { font-size: 24px; font-weight: 700; color: #ff4444; }
  .overlay .sub { font-size: 14px; opacity: 0.7; }
  .btn {
    background: #0f3460; color: #eee; border: 1px solid #1a508b;
    border-radius: 8px; padding: 10px 24px; font-size: 16px;
    font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: #1a508b; }
  .hint {
    text-align: center; font-size: 12px; opacity: 0.5;
    margin-top: 8px; width: 100%;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">🪨 合成大石头</div>
    <div class="scores">
      <div class="score-box">得分<div class="val" id="score">0</div></div>
      <div class="score-box">最高<div class="val" id="best">0</div></div>
    </div>
  </div>
  <div class="game-wrap" id="wrap">
    <canvas id="c"></canvas>
    <div class="overlay" id="overlay">
      <div class="msg" id="oMsg">🪨 合成大石头</div>
      <div class="sub" id="oSub">滑动调整位置 · 松手释放</div>
      <button class="btn" id="oBtn">开始游戏</button>
    </div>
  </div>
  <div class="hint">← 滑动调整位置 · 松手释放 →</div>
</div>

<script>
const CANVAS_W = 340;
const CANVAS_H = 560;
const WALL = 6;

const STONE_TYPES = [
  { name:'沙', color:'#d4c5a9', r:11, score:1,  nextChance:0.30 },
  { name:'石', color:'#a0a0a0', r:15, score:2,  nextChance:0.28 },
  { name:'岩', color:'#8b7355', r:20, score:4,  nextChance:0.20 },
  { name:'矿', color:'#cd853f', r:26, score:8,  nextChance:0.12 },
  { name:'铁', color:'#708090', r:34, score:16, nextChance:0.07 },
  { name:'银', color:'#c0c0c0', r:44, score:32, nextChance:0.025 },
  { name:'金', color:'#ffd700', r:56, score:64, nextChance:0.005 },
  { name:'钻', color:'#e0ffff', r:70, score:128,nextChance:0 },
];
const MAX_TYPE = STONE_TYPES.length - 1;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
const overlay = document.getElementById('overlay');
const oMsg = document.getElementById('oMsg');
const oSub = document.getElementById('oSub');
const oBtn = document.getElementById('oBtn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

let stones = [];
let score = 0;
let best = parseInt(localStorage.getItem('mergeStone_best') || '0');
let gameOver = false;
let paused = true;
let nextType = 0;
let dropX = CANVAS_W / 2;
let dropLocked = false;
let animId = null;
let lastTime = 0;

// Input state
let pointerDown = false;
let pointerX = CANVAS_W / 2;

// Resize
function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = wrap.getBoundingClientRect();
  canvas.width = CANVAS_W * dpr;
  canvas.height = CANVAS_H * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = (rect.width * CANVAS_H / CANVAS_W) + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(dpr, dpr);
}

// ---------- Next stone picker ----------
function pickNextType() {
  const r = Math.random();
  let cum = 0;
  for (let i = 0; i < STONE_TYPES.length; i++) {
    cum += STONE_TYPES[i].nextChance;
    if (r < cum) return i;
  }
  return STONE_TYPES.length - 2; // fallback
}

// ---------- Rendering ----------
function drawStone(s) {
  const t = STONE_TYPES[s.type];
  const r = t.r;
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.arc(s.x + 2, s.y + 3, r, 0, Math.PI*2);
  ctx.fill();
  // Body
  const grad = ctx.createRadialGradient(s.x - r*0.3, s.y - r*0.3, r*0.1, s.x, s.y, r);
  grad.addColorStop(0, lighten(t.color, 0.35));
  grad.addColorStop(0.6, t.color);
  grad.addColorStop(1, darken(t.color, 0.35));
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(s.x, s.y, r, 0, Math.PI*2);
  ctx.fill();
  // Border
  ctx.strokeStyle = darken(t.color, 0.2);
  ctx.lineWidth = 1.5;
  ctx.stroke();
  // Label
  ctx.fillStyle = s.type >= 5 ? '#333' : '#fff';
  ctx.font = `bold ${Math.max(10, r*0.48)}px "PingFang SC","Microsoft YaHei",sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(t.name, s.x, s.y + 1);
}

function drawGame() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  // Walls
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, CANVAS_W, WALL);
  ctx.fillRect(0, 0, WALL, CANVAS_H);
  ctx.fillRect(CANVAS_W - WALL, 0, WALL, CANVAS_H);
  ctx.fillRect(0, CANVAS_H - WALL, CANVAS_W, WALL);
  // Floor line
  ctx.strokeStyle = '#0f3460';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath(); ctx.moveTo(WALL, CANVAS_H - WALL); ctx.lineTo(CANVAS_W - WALL, CANVAS_H - WALL); ctx.stroke();
  ctx.setLineDash([]);

  // Danger line
  const dangerY = 90;
  ctx.strokeStyle = 'rgba(255,68,68,0.3)';
  ctx.beginPath(); ctx.moveTo(WALL, dangerY); ctx.lineTo(CANVAS_W - WALL, dangerY); ctx.stroke();

  // Stones
  for (const s of stones) drawStone(s);

  // Drop preview
  if (!paused && !gameOver) {
    const t = STONE_TYPES[nextType];
    const previewY = WALL + t.r + 4;
    const px = Math.max(WALL + t.r, Math.min(CANVAS_W - WALL - t.r, dropX));
    ctx.globalAlpha = 0.6;
    drawStone({ x: px, y: previewY, type: nextType });
    ctx.globalAlpha = 1;
    // Drop line
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath(); ctx.moveTo(px, previewY + t.r + 2); ctx.lineTo(px, CANVAS_H - WALL - t.r); ctx.stroke();
  }
}

// ---------- Physics ----------
function lighten(hex, amt) {
  const r = Math.min(255, parseInt(hex.slice(1,3),16) + Math.floor(255*amt));
  const g = Math.min(255, parseInt(hex.slice(3,5),16) + Math.floor(255*amt));
  const b = Math.min(255, parseInt(hex.slice(5,7),16) + Math.floor(255*amt));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, amt) {
  const r = Math.max(0, parseInt(hex.slice(1,3),16) - Math.floor(255*amt));
  const g = Math.max(0, parseInt(hex.slice(3,5),16) - Math.floor(255*amt));
  const b = Math.max(0, parseInt(hex.slice(5,7),16) - Math.floor(255*amt));
  return `rgb(${r},${g},${b})`;
}

function spawnStone() {
  if (gameOver || paused) return;
  const t = STONE_TYPES[nextType];
  const x = Math.max(WALL + t.r, Math.min(CANVAS_W - WALL - t.r, dropX));
  const y = WALL + t.r + 4;
  stones.push({
    x, y,
    vx: (Math.random() - 0.5) * 20,
    vy: 0,
    type: nextType,
  });
  nextType = pickNextType();
  dropX = CANVAS_W / 2;
}

function mergeStones(a, b) {
  if (a.type >= MAX_TYPE || b.type >= MAX_TYPE) return false;
  const newType = a.type + 1;
  const mx = (a.x + b.x) / 2;
  const my = (a.y + b.y) / 2;
  const idxA = stones.indexOf(a);
  const idxB = stones.indexOf(b);
  if (idxA < 0 || idxB < 0) return false;
  // Remove both (higher index first)
  if (idxA > idxB) { stones.splice(idxA,1); stones.splice(idxB,1); }
  else { stones.splice(idxB,1); stones.splice(idxA,1); }
  stones.push({
    x: mx, y: my,
    vx: (Math.random()-0.5)*30,
    vy: -40,
    type: newType,
  });
  score += STONE_TYPES[newType].score;
  updateScoreUI();
  return true;
}

function updatePhysics(dt) {
  const GRAVITY = 800;
  const DAMPING = 0.6;
  const BOUNCE = 0.3;

  // Gravity & move
  for (const s of stones) {
    s.vy += GRAVITY * Math.min(dt, 0.05);
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    // Wall collisions
    const r = STONE_TYPES[s.type].r;
    if (s.x - r < WALL) { s.x = WALL + r; s.vx *= -BOUNCE; }
    if (s.x + r > CANVAS_W - WALL) { s.x = CANVAS_W - WALL - r; s.vx *= -BOUNCE; }
    if (s.y + r > CANVAS_H - WALL) { s.y = CANVAS_H - WALL - r; s.vy *= -BOUNCE; }
    // Friction on floor
    if (s.y + r >= CANVAS_H - WALL - 1) { s.vx *= 0.92; }
  }

  // Collision detection & resolution
  const checked = new Set();
  for (let i = 0; i < stones.length; i++) {
    for (let j = i + 1; j < stones.length; j++) {
      const a = stones[i], b = stones[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const rSum = STONE_TYPES[a.type].r + STONE_TYPES[b.type].r;
      if (dist < rSum && dist > 0.001) {
        if (a.type === b.type) {
          // Merge
          if (mergeStones(a, b)) { i = -1; break; } // restart loop
        } else {
          // Separate
          const overlap = rSum - dist;
          const nx = dx / dist, ny = dy / dist;
          const aRatio = STONE_TYPES[b.type].r / (STONE_TYPES[a.type].r + STONE_TYPES[b.type].r);
          a.x -= nx * overlap * aRatio;
          a.y -= ny * overlap * aRatio;
          b.x += nx * overlap * (1 - aRatio);
          b.y += ny * overlap * (1 - aRatio);
          // Bounce
          const relVx = a.vx - b.vx, relVy = a.vy - b.vy;
          const relVn = relVx * nx + relVy * ny;
          if (relVn > 0) {
            const imp = relVn * DAMPING;
            a.vx -= nx * imp * (1 - aRatio);
            a.vy -= ny * imp * (1 - aRatio);
            b.vx += nx * imp * aRatio;
            b.vy += ny * imp * aRatio;
          }
        }
      }
    }
  }

  // Game over check
  for (const s of stones) {
    if (s.vy < 5 && s.y - STONE_TYPES[s.type].r < 85 && Math.abs(s.vx) < 10) {
      gameOver = true;
      paused = true;
      showOverlay('💀 石头堆太高了！', '点击重新开始');
      return;
    }
  }
}

// ---------- Game loop ----------
function gameLoop(time) {
  if (!lastTime) lastTime = time;
  let dt = (time - lastTime) / 1000;
  if (dt > 0.1) dt = 0.1; // cap
  lastTime = time;

  if (!paused && !gameOver) {
    updatePhysics(dt);
  }
  drawGame();
  if (!gameOver) animId = requestAnimationFrame(gameLoop);
}

// ---------- UI ----------
function updateScoreUI() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('mergeStone_best', best);
  }
  bestEl.textContent = best;
}

function showOverlay(msg, sub) {
  oMsg.textContent = msg;
  oSub.textContent = sub;
  oBtn.textContent = paused && !gameOver ? '开始游戏' : '重新开始';
  overlay.style.display = 'flex';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

function startGame() {
  stones = [];
  score = 0;
  gameOver = false;
  paused = true;
  nextType = pickNextType();
  dropX = CANVAS_W / 2;
  updateScoreUI();
  showOverlay('🪨 合成大石头', '滑动调整位置 · 松手释放');
  drawGame();
}

function resumeGame() {
  paused = false;
  hideOverlay();
  lastTime = 0;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(gameLoop);
}

// ---------- Input ----------
function getCanvasX(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CANVAS_W / rect.width;
  return (e.clientX - rect.left) * scaleX;
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (gameOver) { startGame(); resumeGame(); return; }
  if (paused) { resumeGame(); return; }
  pointerDown = true;
  dropX = getCanvasX(e);
});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (gameOver || paused) return;
  pointerX = getCanvasX(e);
  if (pointerDown) dropX = pointerX;
});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  if (gameOver || paused) return;
  pointerDown = false;
  spawnStone();
});

canvas.addEventListener('pointerleave', e => {
  if (pointerDown && !gameOver && !paused) {
    pointerDown = false;
    spawnStone();
  }
});

// Keyboard fallback
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameOver) { startGame(); resumeGame(); return; }
    if (paused) { resumeGame(); return; }
    spawnStone();
  }
  if (e.code === 'ArrowLeft') { e.preventDefault(); dropX -= 20; }
  if (e.code === 'ArrowRight') { e.preventDefault(); dropX += 20; }
  const t = STONE_TYPES[nextType];
  dropX = Math.max(WALL + t.r, Math.min(CANVAS_W - WALL - t.r, dropX));
});

oBtn.addEventListener('click', () => {
  if (gameOver || paused) { startGame(); resumeGame(); }
});

// ---------- Init ----------
resizeCanvas();
window.addEventListener('resize', resizeCanvas);
startGame();
</script>
</body>
</html>
