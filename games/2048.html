<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #faf8ef;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; color: #776e65;
  }
  .container { width: 500px; max-width: 95vw; }
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px;
  }
  .title { font-size: 64px; font-weight: 900; color: #776e65; line-height: 1; }
  .scores { display: flex; gap: 8px; }
  .score-box {
    background: #bbada0; color: #fff; border-radius: 6px;
    padding: 8px 16px; text-align: center; min-width: 80px;
  }
  .score-box .label { font-size: 11px; text-transform: uppercase; opacity: 0.8; }
  .score-box .value { font-size: 22px; font-weight: 700; }
  .info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .desc { font-size: 14px; line-height: 1.5; }
  .desc strong { font-weight: 700; }
  .btn {
    background: #8f7a66; color: #f9f6f2; border: none; border-radius: 6px;
    padding: 10px 22px; font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #9f8b77; }
  .board {
    position: relative; background: #bbada0; border-radius: 10px;
    padding: 12px; display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 12px; aspect-ratio: 1; width: 100%;
  }
  .cell {
    background: rgba(238, 228, 218, 0.35);
    border-radius: 6px;
  }
  .tile-container {
    position: absolute; top: 12px; left: 12px;
    right: 12px; bottom: 12px;
  }
  .tile {
    position: absolute;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 40px;
    transition: transform 100ms ease-in-out;
    /* Colors set via JS inline style */
  }
  .game-over-overlay {
    position: absolute; inset: 0; background: rgba(238, 228, 218, 0.73);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 48px; font-weight: 700; color: #776e65; z-index: 10;
  }
  @media (max-width: 520px) {
    .title { font-size: 42px; }
    .tile { font-size: 28px; }
    .board { padding: 8px; gap: 8px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box">
        <div class="label">分数</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="score-box">
        <div class="label">最高</div>
        <div class="value" id="best">0</div>
      </div>
    </div>
  </div>
  <div class="info">
    <div class="desc">
      使用<strong>方向键</strong>移动方块。<br>相同数字合并，拼出<strong>2048</strong>！
    </div>
    <button class="btn" id="restart">重新开始</button>
  </div>
  <div class="board" id="board">
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    <div class="tile-container" id="tiles"></div>
    <div class="game-over-overlay" id="overlay" style="display:none"></div>
  </div>
</div>

<script>
const SIZE = 4;

// Colors for tile values
const COLORS = {
  2:    { bg: '#eee4da', fg: '#776e65' },
  4:    { bg: '#ede0c8', fg: '#776e65' },
  8:    { bg: '#f2b179', fg: '#f9f6f2' },
  16:   { bg: '#f59563', fg: '#f9f6f2' },
  32:   { bg: '#f67c5f', fg: '#f9f6f2' },
  64:   { bg: '#f65e3b', fg: '#f9f6f2' },
  128:  { bg: '#edcf72', fg: '#f9f6f2' },
  256:  { bg: '#edcc61', fg: '#f9f6f2' },
  512:  { bg: '#edc850', fg: '#f9f6f2' },
  1024: { bg: '#edc53f', fg: '#f9f6f2' },
  2048: { bg: '#edc22e', fg: '#f9f6f2' },
  4096: { bg: '#3c3a32', fg: '#f9f6f2' },
};
const DEFAULT_COLOR = { bg: '#3c3a32', fg: '#f9f6f2' };

let grid = [];
let score = 0;

// DOM
const tilesEl = document.getElementById('tiles');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlayEl = document.getElementById('overlay');
const boardEl = document.getElementById('board');

let best = parseInt(localStorage.getItem('2048_best') || '0');

// ---------- Grid ops ----------
function emptyGrid() {
  return Array.from({length: SIZE}, () => Array(SIZE).fill(0));
}

function addRandomTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return false;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  return true;
}

// Slide one row left; returns [newRow, mergedScore]
function slideRow(row) {
  const filtered = row.filter(v => v !== 0);
  const result = [];
  let i = 0, merged = 0;
  while (i < filtered.length) {
    if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
      const v = filtered[i] * 2;
      result.push(v);
      merged += v;
      i += 2;
    } else {
      result.push(filtered[i]);
      i++;
    }
  }
  while (result.length < SIZE) result.push(0);
  return [result, merged];
}

function moveGrid(direction) {
  // direction: 0=up, 1=right, 2=down, 3=left
  let moved = false, added = 0;
  const old = grid.map(r => [...r]);

  if (direction === 3) { // left
    for (let r = 0; r < SIZE; r++) {
      const [newRow, m] = slideRow(grid[r]);
      grid[r] = newRow;
      added += m;
      if (!moved && old[r].join(',') !== newRow.join(',')) moved = true;
    }
  } else if (direction === 1) { // right
    for (let r = 0; r < SIZE; r++) {
      const rev = grid[r].slice().reverse();
      const [newRev, m] = slideRow(rev);
      grid[r] = newRev.reverse();
      added += m;
      if (!moved && old[r].join(',') !== grid[r].join(',')) moved = true;
    }
  } else if (direction === 0) { // up
    for (let c = 0; c < SIZE; c++) {
      const col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
      const [newCol, m] = slideRow(col);
      for (let r = 0; r < SIZE; r++) grid[r][c] = newCol[r];
      added += m;
    }
    // check moved
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (old[r][c] !== grid[r][c]) moved = true;
  } else if (direction === 2) { // down
    for (let c = 0; c < SIZE; c++) {
      const col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]]; // reversed for slideRow
      const [newCol, m] = slideRow(col);
      for (let i = 0; i < SIZE; i++) grid[SIZE-1-i][c] = newCol[i];
      added += m;
    }
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        if (old[r][c] !== grid[r][c]) moved = true;
  }

  if (moved) {
    score += added;
    addRandomTile();
  }
  updateUI();
}

function isGameOver() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return false;
      if (c + 1 < SIZE && grid[r][c] === grid[r][c+1]) return false;
      if (r + 1 < SIZE && grid[r][c] === grid[r+1][c]) return false;
    }
  return true;
}

function hasWon() {
  return grid.some(row => row.some(v => v >= 2048));
}

// ---------- Rendering ----------
function updateUI() {
  scoreEl.textContent = score;
  if (score > best) {
    best = score;
    localStorage.setItem('2048_best', best);
  }
  bestEl.textContent = best;

  // Render tiles
  tilesEl.innerHTML = '';
  const boardW = boardEl.clientWidth - 24; // padding * 2
  const gap = 12;
  const cellW = (boardW - gap * (SIZE - 1)) / SIZE;

  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const v = grid[r][c];
      if (v === 0) continue;
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.textContent = v;
      const colors = COLORS[v] || DEFAULT_COLOR;
      tile.style.background = colors.bg;
      tile.style.color = colors.fg;
      tile.style.left = (c * (cellW + gap)) + 'px';
      tile.style.top = (r * (cellW + gap)) + 'px';
      tile.style.width = cellW + 'px';
      tile.style.height = cellW + 'px';
      tile.style.lineHeight = cellW + 'px';
      tile.style.fontSize = (cellW * 0.42) + 'px';
      tilesEl.appendChild(tile);
    }
  }

  // Overlay
  if (hasWon()) {
    overlayEl.style.display = 'flex';
    overlayEl.textContent = '你赢了！🎉';
  } else if (isGameOver()) {
    overlayEl.style.display = 'flex';
    overlayEl.textContent = '游戏结束';
  } else {
    overlayEl.style.display = 'none';
  }
}

// ---------- Init & Events ----------
function startGame() {
  grid = emptyGrid();
  score = 0;
  addRandomTile();
  addRandomTile();
  updateUI();
}

document.getElementById('restart').addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  const map = { ArrowUp: 0, ArrowRight: 1, ArrowDown: 2, ArrowLeft: 3 };
  if (map[e.key] !== undefined) {
    e.preventDefault();
    moveGrid(map[e.key]);
  }
});

// Touch support
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return; // too small
  if (Math.abs(dx) > Math.abs(dy)) {
    moveGrid(dx > 0 ? 1 : 3); // right : left
  } else {
    moveGrid(dy > 0 ? 2 : 0); // down : up
  }
});

// Handle window resize
window.addEventListener('resize', updateUI);

startGame();
</script>
</body>
</html>
